<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Roomdr – Logo Concepts</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0e0e0e;
      font-family: 'Inter', sans-serif;
      padding: 48px 32px;
      min-height: 100vh;
    }

    h2 {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .section {
      margin-bottom: 56px;
    }

    .section-title {
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Logo cards */
    .logo-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .logo-card {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 36px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo-card.light-bg {
      background: #f5f5f5;
    }

    .logo-display {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .logo-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      text-align: right;
      min-width: 80px;
    }

    .logo-card.light-bg .logo-label {
      color: rgba(0,0,0,0.2);
    }

    /* ===== LOGO VARIANT 1: Icon + Wordmark horizontal ===== */
    .logo-v1 {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-box {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #ff6b5b, #e83a2a);
      box-shadow: 0 6px 20px rgba(255,80,60,0.4);
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    .wordmark span {
      color: #ff6b5b;
    }

    /* ===== LOGO VARIANT 2: Stacked ===== */
    .logo-v2 {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .icon-box-lg {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #ff6b5b, #e83a2a);
      box-shadow: 0 8px 28px rgba(255,80,60,0.45);
    }

    .wordmark-lg {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: -4px;
    }

    /* ===== LOGO VARIANT 3: Icon only (app icon) ===== */
    .icon-sizes {
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .app-icon {
      border-radius: 22%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #ff6b5b, #e83a2a);
      box-shadow: 0 6px 20px rgba(255,80,60,0.4);
      flex-shrink: 0;
    }

    /* ===== LOGO VARIANT 4: Dark icon style ===== */
    .icon-box-dark {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #2a1a1a, #1a0f0f);
      border: 1.5px solid rgba(255,107,91,0.3);
      box-shadow: 0 0 20px rgba(255,80,60,0.2);
      flex-shrink: 0;
    }

    .wordmark-dark {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    /* ===== Monochrome ===== */
    .wordmark-mono {
      font-size: 28px;
      font-weight: 800;
      color: #000;
      letter-spacing: -1px;
    }

    .icon-box-mono {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      flex-shrink: 0;
    }

    /* House SVG icon */
    .house-icon {
      /* used inline */
    }
  </style>
</head>
<body>

  <h2>Roomdr — Logo Concepts</h2>

  <!-- VARIANT 1: Horizontal with gradient icon -->
  <div class="section">
    <div class="section-title">Option A — Horizontal (Dark background)</div>
    <div class="logo-grid">
      <div class="logo-card">
        <div class="logo-display">
          <div class="logo-v1">
            <div class="icon-box">
              <svg width="28" height="28" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="rgba(255,107,91,0.6)"/>
              </svg>
            </div>
            <span class="wordmark">room<span>dr</span></span>
          </div>
        </div>
        <span class="logo-label">Primary</span>
      </div>
    </div>
  </div>

  <!-- VARIANT 2: Stacked centered -->
  <div class="section">
    <div class="section-title">Option B — Stacked with Tagline</div>
    <div class="logo-grid">
      <div class="logo-card">
        <div class="logo-display">
          <div class="logo-v2">
            <div class="icon-box-lg">
              <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="rgba(255,107,91,0.5)"/>
              </svg>
            </div>
            <span class="wordmark-lg">roomdr</span>
            <span class="tagline">Find Your Match</span>
          </div>
        </div>
        <span class="logo-label">Centered</span>
      </div>
    </div>
  </div>

  <!-- VARIANT 3: App icon sizes -->
  <div class="section">
    <div class="section-title">Option C — App Icon (Multiple sizes)</div>
    <div class="logo-grid">
      <div class="logo-card">
        <div class="logo-display">
          <div class="icon-sizes">
            <!-- 96px -->
            <div class="app-icon" style="width:96px;height:96px;border-radius:22px;box-shadow:0 10px 30px rgba(255,80,60,0.5);">
              <svg width="52" height="52" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="rgba(255,107,91,0.5)"/>
              </svg>
            </div>
            <!-- 64px -->
            <div class="app-icon" style="width:64px;height:64px;border-radius:16px;">
              <svg width="34" height="34" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="rgba(255,107,91,0.5)"/>
              </svg>
            </div>
            <!-- 48px -->
            <div class="app-icon" style="width:48px;height:48px;border-radius:12px;">
              <svg width="26" height="26" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
              </svg>
            </div>
            <!-- 32px -->
            <div class="app-icon" style="width:32px;height:32px;border-radius:8px;">
              <svg width="18" height="18" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
              </svg>
            </div>
          </div>
        </div>
        <span class="logo-label">App Icon</span>
      </div>
    </div>
  </div>

  <!-- VARIANT 4: Dark outline style -->
  <div class="section">
    <div class="section-title">Option D — Dark / Outline Style</div>
    <div class="logo-grid">
      <div class="logo-card">
        <div class="logo-display">
          <div class="logo-v1">
            <div class="icon-box-dark">
              <svg width="26" height="26" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" stroke="#ff6b5b" stroke-width="2.5" fill="none"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="#ff6b5b" opacity="0.6"/>
              </svg>
            </div>
            <span class="wordmark-dark" style="background: linear-gradient(135deg, #ff6b5b, #ffaa80); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">roomdr</span>
          </div>
        </div>
        <span class="logo-label">Gradient Text</span>
      </div>
    </div>
  </div>

  <!-- Light background versions -->
  <div class="section">
    <div class="section-title">On Light Background</div>
    <div class="logo-grid">
      <div class="logo-card light-bg">
        <div class="logo-display">
          <div class="logo-v1">
            <div class="icon-box">
              <svg width="28" height="28" viewBox="0 0 38 38" fill="none">
                <path d="M5 17L19 4L33 17V34C33 34.6 32.5 35 32 35H25V25H13V35H6C5.5 35 5 34.6 5 34V17Z" fill="white"/>
                <rect x="15" y="25" width="8" height="10" rx="1.5" fill="rgba(255,107,91,0.5)"/>
              </svg>
            </div>
            <span style="font-size:28px;font-weight:800;color:#111;letter-spacing:-1px;">room<span style="color:#ff4040;">dr</span></span>
          </div>
        </div>
        <span class="logo-label" style="color:rgba(0,0,0,0.3);">Light BG</span>
      </div>
    </div>
  </div>

</body>
</html>
